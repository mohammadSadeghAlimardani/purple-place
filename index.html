        <link rel="stylesheet" href="./css/reset.css"/>

        <audio id="click-effect" src="./audio/mouse-click-153941.mp3">

        <audio id="winning-game" src="./audio/SCNB3LA-winning.mp3">

        <script src="./app.js"></script>
